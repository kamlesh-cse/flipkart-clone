<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-5">
        <h3><i class="bi bi-credit-card"></i> Checkout</h3>
        <hr>

        <div class="row">
            <!-- Shipping Details Form -->
            <div class="col-md-7">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Shipping Details</h5>
                        <form th:action="@{/orders/place}" method="post" id="checkoutForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:value="${user.name}" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:value="${user.email}" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Shipping Address</label>
                                <textarea name="shippingAddress" class="form-control" rows="3" th:text="${user.address}"
                                    required placeholder="Enter your complete shipping address"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Payment Method</label>
                                <select class="form-select" name="paymentMethod">
                                    <option>Cash on Delivery (COD)</option>
                                    <option>UPI Payment</option>
                                    <option>Debit/Credit Card</option>
                                </select>
                            </div>

                             <button type="button" class="btn btn-tertiary-fk btn-lg w-100 py-3 shadow-sm" onclick="confirmOrder()">
                                 <i class="bi bi-check-circle me-1"></i> PLACE ORDER
                             </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Order Summary</h5>
                        <hr>

                        <div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-2">
                            <span>
                                <span th:text="${item.product.name}">Product</span>
                                x <span th:text="${item.quantity}">1</span>
                            </span>
                            <span>Rs. <span
                                    th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 1, 0)}"></span></span>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>Total:</span>
                            <span class="text-primary">
                                Rs. <span th:text="${#numbers.formatDecimal(total, 1, 0)}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/chatbot.js}"></script>

    <!-- Confirm order with SweetAlert -->
    <script>
        function confirmOrder() {
            Swal.fire({
                title: 'Confirm Order?',
                text: "Are you sure you want to place this order?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#fb641b',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, Place Order!',
                cancelButtonText: 'Cancel',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('checkoutForm').submit();
                }
            });
        }
    </script>

    <script th:if="${error}" th:inline="javascript">
        Swal.fire('Error!', /*[[${error}]]*/ '', 'error');
    </script>

</body>

</html>
