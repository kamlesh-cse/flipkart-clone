<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body>

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h3><i class="bi bi-people"></i> All Users</h3>
    <hr>

    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Registered</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.name}">Name</td>
                    <td th:text="${user.email}">email@mail.com</td>
                    <td th:text="${user.phone ?: 'N/A'}">Phone</td>
                    <td>
                        <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                        <span th:if="${user.role == 'USER'}" class="badge bg-primary">USER</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary"
                                data-bs-toggle="modal" th:data-bs-target="'#editUserModal' + ${user.id}">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Are you sure you want to delete this user?');">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                        
                        <!-- Edit Modal -->
                        <div class="modal fade" th:id="'editUserModal' + ${user.id}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Edit User - <span th:text="${user.name}"></span></h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <form th:action="@{/admin/users/update}" method="post">
                                        <div class="modal-body text-start">
                                            <input type="hidden" name="id" th:value="${user.id}">
                                            
                                            <div class="mb-3">
                                                <label class="form-label">Name</label>
                                                <input type="text" class="form-control" name="name" th:value="${user.name}" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" name="email" th:value="${user.email}" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Role</label>
                                                <select class="form-select" name="role" required>
                                                    <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                                                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                            <button type="submit" class="btn btn-primary">Save Changes</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
