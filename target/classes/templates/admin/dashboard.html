<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body>

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h3><i class="bi bi-speedometer2"></i> Admin Dashboard</h3>
    <hr>

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card bg-primary text-white shadow">
                <div class="card-body text-center">
                    <i class="bi bi-box-seam" style="font-size: 2rem;"></i>
                    <h3 th:text="${totalProducts}">0</h3>
                    <p class="mb-0">Total Products</p>
                </div>
                <div class="card-footer bg-transparent border-0 text-center">
                    <a th:href="@{/admin/products}" class="text-white">Manage Products &rarr;</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card bg-success text-white shadow">
                <div class="card-body text-center">
                    <i class="bi bi-bag-check" style="font-size: 2rem;"></i>
                    <h3 th:text="${totalOrders}">0</h3>
                    <p class="mb-0">Total Orders</p>
                </div>
                <div class="card-footer bg-transparent border-0 text-center">
                    <a th:href="@{/admin/orders}" class="text-white">Manage Orders &rarr;</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card bg-info text-white shadow">
                <div class="card-body text-center">
                    <i class="bi bi-people" style="font-size: 2rem;"></i>
                    <h3 th:text="${totalUsers}">0</h3>
                    <p class="mb-0">Total Users</p>
                </div>
                <div class="card-footer bg-transparent border-0 text-center">
                    <a th:href="@{/admin/users}" class="text-white">View Users &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="row mb-4">
        <div class="col-12">
            <h5>Quick Actions</h5>
            <a th:href="@{/admin/products/add}" class="btn btn-outline-primary me-2">
                <i class="bi bi-plus-circle"></i> Add New Product
            </a>
            <a th:href="@{/admin/orders}" class="btn btn-outline-success me-2">
                <i class="bi bi-list-check"></i> View All Orders
            </a>
        </div>
    </div>

    <!-- Recent Orders Table -->
    <div class="card shadow-sm">
        <div class="card-header">
            <h5 class="mb-0">Recent Orders</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(recentOrders)}" class="text-muted text-center py-3">
                No orders yet.
            </div>
            <table th:if="${!#lists.isEmpty(recentOrders)}" class="table table-hover">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${recentOrders}">
                        <td>#<span th:text="${order.id}"></span></td>
                        <td th:text="${order.user.name}">Customer</td>
                        <td>Rs. <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 0)}"></span></td>
                        <td>
                            <span th:switch="${order.status}">
                                <span th:case="'PLACED'" class="badge bg-info">PLACED</span>
                                <span th:case="'CONFIRMED'" class="badge bg-primary">CONFIRMED</span>
                                <span th:case="'SHIPPED'" class="badge bg-warning text-dark">SHIPPED</span>
                                <span th:case="'DELIVERED'" class="badge bg-success">DELIVERED</span>
                                <span th:case="'CANCELLED'" class="badge bg-danger">CANCELLED</span>
                            </span>
                        </td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">Date</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${success}" th:inline="javascript">
    Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
</script>

</body>
</html>
