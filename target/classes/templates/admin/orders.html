<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body>

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h3><i class="bi bi-bag-check"></i> Manage Orders</h3>
    <hr>

    <!-- No orders message -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 text-muted">
        <h4>No orders found.</h4>
    </div>

    <!-- Orders Table -->
    <div th:if="${!#lists.isEmpty(orders)}" class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Email</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td>#<span th:text="${order.id}"></span></td>
                    <td th:text="${order.user.name}">Customer</td>
                    <td th:text="${order.user.email}">email@mail.com</td>
                    <td>
                        <ul class="list-unstyled mb-0">
                            <li th:each="item : ${order.orderItems}" class="small">
                                <span th:text="${item.product.name}">Product</span>
                                x<span th:text="${item.quantity}">1</span>
                            </li>
                        </ul>
                    </td>
                    <td class="fw-bold">
                        Rs. <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 0)}"></span>
                    </td>
                    <td>
                        <span th:switch="${order.status}">
                            <span th:case="'PLACED'" class="badge bg-info">PLACED</span>
                            <span th:case="'CONFIRMED'" class="badge bg-primary">CONFIRMED</span>
                            <span th:case="'SHIPPED'" class="badge bg-warning text-dark">SHIPPED</span>
                            <span th:case="'DELIVERED'" class="badge bg-success">DELIVERED</span>
                            <span th:case="'CANCELLED'" class="badge bg-danger">CANCELLED</span>
                        </span>
                    </td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">Date</td>
                    <td>
                        <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}"
                              method="post" class="d-flex">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="status" class="form-select form-select-sm me-2">
                                <option value="PLACED" th:selected="${order.status == 'PLACED'}">PLACED</option>
                                <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">CONFIRMED</option>
                                <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary-fk">
                                <i class="bi bi-check"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${success}" th:inline="javascript">
    Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
</script>

</body>
</html>
