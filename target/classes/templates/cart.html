<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-4">
        <!-- Empty Cart Message -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5 bg-white shadow-sm rounded">
            <img src="https://cdn-icons-png.flaticon.com/512/16961/16961608.png"
                width="200" class="mb-4" alt="Empty Cart">
            <h4 class="fw-bold">Your cart is empty!</h4>
            <p class="text-muted small">Add items to it now.</p>
            <a th:href="@{/home}" class="btn btn-primary-fk px-5 py-2 mt-3 rounded-0 shadow-sm">Shop Now</a>
        </div>

        <!-- Cart Layout -->
        <div th:if="${!#lists.isEmpty(cartItems)}" class="row">
            <!-- Main Cart (Items) -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-0 mb-3">
                    <div class="card-header bg-white py-3 border-bottom">
                        <h5 class="mb-0 fw-bold">My Cart (<span th:text="${#lists.size(cartItems)}"></span>)</h5>
                    </div>
                    <!-- Cart Items -->
                    <div class="list-group list-group-flush">
                        <div th:each="item : ${cartItems}" class="list-group-item p-4">
                            <div class="row">
                                <div class="col-3 col-md-2 text-center">
                                    <img th:src="${item.product.imageUrl != null && !item.product.imageUrl.isEmpty()} ? ${item.product.imageUrl} : '/images/no-image.png'"
                                        class="img-fluid" th:alt="${item.product.name}"
                                        style="max-height: 100px; object-fit: contain;">

                                    <!-- BUG-FIX INFO-05: Added CSRF token to update form -->
                                    <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post"
                                        class="mt-3 d-flex justify-content-center align-items-center">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                            max="10" class="form-control form-control-sm text-center border px-1"
                                            style="width: 45px; height: 28px;">
                                        <button type="submit" class="btn btn-sm btn-link text-primary fw-bold p-0 ms-1"
                                            title="Update">
                                            <i class="bi bi-arrow-repeat"></i>
                                        </button>
                                    </form>
                                </div>
                                <div class="col-9 col-md-10">
                                    <div class="d-flex justify-content-between mb-1">
                                        <h6 class="mb-0 fw-normal" th:text="${item.product.name}">Product Name</h6>
                                        <span class="text-muted small"
                                            th:text="${item.product.category}">Category</span>
                                    </div>
                                    <div class="mb-2">
                                        <img src="https://static-assets-web.flixcart.com/batman-returns/static/content/svg/fa_62673a.svg"
                                            height="15" alt="Assured">
                                    </div>
                                    <!-- BUG-FIX INFO-02: Replaced hardcoded ₹2,999 / 50% off with real price -->
                                    <div class="d-flex align-items-center gap-2 mb-3">
                                        <span class="fw-bold fs-5">₹<span
                                                th:text="${#numbers.formatDecimal(item.product.price, 1, 0)}"></span></span>
                                        <span class="text-muted small">× <span th:text="${item.quantity}"></span></span>
                                        <span class="text-success small fw-bold">= ₹<span
                                                th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 1, 0)}"></span></span>
                                    </div>
                                    <div class="d-flex gap-3">
                                        <!-- BUG-FIX INFO-04: Replaced dead "SAVE FOR LATER" link with product details link -->
                                        <a th:href="@{/product/{id}(id=${item.product.id})}"
                                            class="btn btn-link btn-sm text-muted fw-bold text-decoration-none p-0">VIEW
                                            DETAILS</a>
                                        <!-- BUG-FIX INFO-05: Added CSRF token to remove form -->
                                        <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post"
                                            class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                th:value="${_csrf.token}">
                                            <button type="submit"
                                                class="btn btn-link btn-sm text-danger fw-bold text-decoration-none p-0">REMOVE</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Checkout Bar -->
                    <div class="card-footer bg-white text-end py-3 sticky-bottom shadow">
                        <a th:href="@{/checkout}" class="btn btn-tertiary-fk px-5 py-2 fw-bold shadow">PLACE ORDER</a>
                    </div>
                </div>
            </div>

            <!-- Price Details Sidebar (Right) -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-0 sticky-top" style="top: 80px;">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="text-muted fw-bold mb-0 text-uppercase">Price Details</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3">
                            <span>Price (<span th:text="${#lists.size(cartItems)}"></span> items)</span>
                            <span>₹<span th:text="${#numbers.formatDecimal(total, 1, 0)}"></span></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Discount</span>
                            <span class="text-success">- ₹0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
                            <span>Delivery Charges</span>
                            <span class="text-success">FREE</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                            <span>Total Amount</span>
                            <span>₹<span th:text="${#numbers.formatDecimal(total, 1, 0)}"></span></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center mt-4 text-muted small px-2">
                    <i class="bi bi-shield-check fs-4 me-3"></i>
                    <span>Safe and Secure Payments. 100% Authentic products.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/chatbot.js}"></script>

    <script th:if="${success}" th:inline="javascript">
        const msg = /*[[${success}]]*/ '';
        if (msg && msg.trim() !== '') {
            Swal.fire({ title: 'Success!', text: msg, icon: 'success', confirmButtonColor: '#2874f0' });
        }
    </script>
    <script th:if="${error}" th:inline="javascript">
        const errorMsg = /*[[${error}]]*/ '';
        if (errorMsg && errorMsg.trim() !== '') {
            Swal.fire({ title: 'Error!', text: errorMsg, icon: 'error', confirmButtonColor: '#2874f0' });
        }
    </script>

</body>

</html>
