# ========================
# APPLICATION SETTINGS
# ========================
spring.application.name=flipkart-clone
server.port=8081

# =======================
# DATABASE CONFIGURATION
# (MySQL via phpMyAdmin)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/flipkart_clone
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# THYMELEAF SETTINGS
# =======================
spring.thymeleaf.cache=false
spring.main.lazy-initialization=true
spring.devtools.restart.enabled=false
# ========================
# EMAIL CONFIGURATION
# (Using Gmail SMTP - replace with your credentials)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kkamleshprajapati526@gmail.com
spring.mail.password=hfuz ysyr cpok juvi
# Use environment variable for security
spring.mail.properties.mail.smtp.auth=true
app.base-url=http://localhost:8081
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# FILE UPLOAD SIZE LIMIT
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
