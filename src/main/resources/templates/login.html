<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-8">
                <div class="card shadow border-0 rounded-0 overflow-hidden">
                    <div class="row g-0">
                        <!-- Sidebar -->
                        <div class="col-md-4 bg-primary-fk text-white p-4 d-flex flex-column">
                            <h2 class="fw-bold mb-3">Login</h2>
                            <p class="mb-4 text-white-50">Get access to your Orders, Wishlist and Recommendations</p>
                            <div class="mt-auto text-center">
                                <img src="https://itembase.com/wp-content/uploads/2023/02/279-200px600px-Color.png"
                                    class="img-fluid" alt="Login Banner">
                            </div>
                        </div>
                        <!-- Form Area -->
                        <div class="col-md-8 p-5 bg-white">
                            <!-- Messages -->
                            <div th:if="${param.error}" class="alert alert-danger small py-2">
                                We do not recognize that email or password.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-info small py-2">
                                Logged out successfully.
                            </div>

                            <form th:action="@{/login}" method="post">
                                <div class="form-floating mb-3 border-bottom">
                                    <input type="email" class="form-control border-0 px-1" id="username" name="username"
                                        placeholder="Enter Email" required style="box-shadow: none;">
                                    <label for="username" class="px-1 text-muted">Enter Email Address</label>
                                </div>
                                <div class="form-floating mb-4 border-bottom">
                                    <input type="password" class="form-control border-0 px-1" id="password"
                                        name="password" placeholder="Password" required style="box-shadow: none;">
                                    <label for="password" class="px-1 text-muted">Enter Password</label>
                                </div>

                                <p class="small text-muted mb-4" style="font-size: 11px;">
                                    By continuing, you agree to Flipkart's <span class="text-primary">Terms of
                                        Use</span> and <span class="text-primary">Privacy Policy</span>.
                                </p>

                                <button type="submit"
                                    class="btn btn-tertiary-fk w-100 fw-bold py-3 rounded-0 shadow-sm mb-4">
                                    LOGIN
                                </button>

                                <div class="text-center">
                                    <a th:href="@{/forgot-password}"
                                        class="text-decoration-none small fw-bold">Forgot?</a>
                                </div>
                            </form>

                            <div class="mt-5 text-center">
                                <a th:href="@{/signup}" class="text-decoration-none text-primary fw-bold">New to
                                    Flipkart? Create an account</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/chatbot.js}"></script>

    <!-- SweetAlert for flash messages -->
    <script th:if="${success}" th:inline="javascript">
        Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
    </script>
    <script th:if="${error}" th:inline="javascript">
        Swal.fire('Error!', /*[[${error}]]*/ '', 'error');
    </script>

</body>

</html>
