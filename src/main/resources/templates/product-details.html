<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - FlipkartClone'">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-4">
    <div class="bg-white shadow-sm p-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-4" style="font-size: 12px;">
                <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item" th:text="${product.category}">Category</li>
                <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <div class="row">
            <!-- Product Image Section -->
            <div class="col-md-5 mb-4 mb-md-0 position-relative">
                <div class="sticky-top" style="top: 80px; z-index: 1000;">
                    <div class="border p-4 text-center mb-3">
                        <img th:src="${product.imageUrl != null && !product.imageUrl.isEmpty()} ?
                             ${product.imageUrl} : '/images/no-image.png'"
                             class="img-fluid" th:alt="${product.name}" style="max-height: 450px; object-fit: contain;">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <form th:if="${product.stock > 0}" th:action="@{/cart/add/{id}(id=${product.id})}"
                              method="post" sec:authorize="hasAnyRole('USER', 'ADMIN')" class="flex-grow-1">
                            <button type="submit" class="btn btn-warning-fk btn-lg w-100 py-3 rounded-0 fw-bold">
                                <i class="bi bi-cart-plus me-2"></i> ADD TO CART
                            </button>
                        </form>
                        <form th:if="${product.stock > 0}" th:action="@{/cart/buy-now/{id}(id=${product.id})}"
                              method="post" sec:authorize="hasAnyRole('USER', 'ADMIN')" class="flex-grow-1">
                            <button type="submit" class="btn btn-tertiary-fk btn-lg w-100 py-3 rounded-0 fw-bold">
                                <i class="bi bi-lightning-fill me-2"></i> BUY NOW
                            </button>
                        </form>
                    </div>
                    
                    <div sec:authorize="!isAuthenticated()" class="d-grid gap-2">
                        <a th:href="@{/login}" class="btn btn-outline-primary btn-lg rounded-0 py-3 fw-bold">
                           LOGIN TO PURCHASE
                        </a>
                    </div>
                </div>
            </div>

            <!-- Product Details Section -->
            <div class="col-md-7 ps-md-5">
                <h4 class="fw-normal mb-1" th:text="${product.name}">Product Name</h4>
                
                <div class="d-flex align-items-center mb-2 gap-2">
                    <span class="badge bg-success small" th:text="${avgRating > 0} ? ${#numbers.formatDecimal(avgRating, 1, 1)} + ' ★' : 'No ratings'"></span>
                    <span class="text-muted small fw-bold" th:text="${#lists.size(reviews)} + ' Ratings & ' + ${#lists.size(reviews)} + ' Reviews'"></span>
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREE95ra5KHY6pblV7FBUDb7KLs1p2cQZahQg&s" height="20" alt="Assured">
                </div>

                <div class="mb-3">
                    <span class="text-success small fw-bold">Special Price</span>
                    <div class="d-flex align-items-center gap-3">
                        <span class="fs-2 fw-bold">₹<span th:text="${#numbers.formatDecimal(product.price, 1, 0)}"></span></span>
                    </div>
                </div>

                <div class="mb-4">
                    <h6 class="fw-bold small text-muted text-uppercase mb-2">Description</h6>
                    <p class="small" th:text="${product.description}">Product description goes here.</p>
                </div>

                <!-- Stock Info -->
                <div class="mb-4">
                    <div th:if="${product.stock > 0 and product.stock <= 5}" class="text-danger small fw-bold">
                        <i class="bi bi-exclamation-circle-fill me-1"></i> Only <span th:text="${product.stock}"></span> left in stock!
                    </div>
                    <div th:if="${product.stock == 0}" class="text-danger small fw-bold">
                        <i class="bi bi-x-circle-fill me-1"></i> This item is currently out of stock.
                    </div>
                </div>

                <!-- Seller Info -->
                <div class="border rounded p-3 mb-4 bg-light">
                    <span class="text-muted small d-block mb-1">Seller</span>
                    <span class="text-primary fw-bold small">FKClone Retail <span class="badge bg-primary ms-2" style="font-size: 10px;">4.8 <i class="bi bi-star-fill"></i></span></span>
                </div>

                <!-- Reviews -->
                <div class="mt-5 pt-4 border-top">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Ratings & Reviews</h5>
                        <button class="btn btn-outline-primary shadow-sm small py-2 px-4 rounded-0 fw-bold" sec:authorize="hasAnyRole('USER', 'ADMIN')" data-bs-toggle="collapse" data-bs-target="#reviewForm">
                            Rate Product
                        </button>
                    </div>

                    <!-- Add Review Form -->
                    <div class="collapse mb-4" id="reviewForm" sec:authorize="hasAnyRole('USER', 'ADMIN')">
                        <div class="card card-body border p-4 shadow-sm bg-light">
                            <h6 class="fw-bold mb-3">Write a Review</h6>
                            <form th:action="@{/review/{id}(id=${product.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Rating</label>
                                    <select name="rating" class="form-select rounded-0" required>
                                        <option value="5">5 ★ (Excellent)</option>
                                        <option value="4">4 ★ (Very Good)</option>
                                        <option value="3">3 ★ (Good)</option>
                                        <option value="2">2 ★ (Fair)</option>
                                        <option value="1">1 ★ (Poor)</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Description</label>
                                    <textarea name="comment" class="form-control rounded-0" rows="3" placeholder="What did you like or dislike?"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary-fk px-4 py-2 rounded-0 fw-bold">SUBMIT</button>
                            </form>
                        </div>
                    </div>

                    <div th:each="review : ${reviews}" class="border-bottom pb-3 mb-3">
                        <div class="d-flex align-items-center mb-2">
                            <span class="badge bg-success small me-3" th:text="${review.rating} + ' ★'"></span>
                            <span class="fw-bold small" th:text="${review.comment}">Review Summary</span>
                        </div>
                        <div class="d-flex align-items-center text-muted" style="font-size: 12px;">
                            <span class="me-2 fw-bold" th:text="${review.user.name}">User</span>
                            <i class="bi bi-check-circle-fill text-muted me-1" style="font-size: 10px;"></i>
                            <span class="me-2">Certified Buyer</span>
                            <span th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">Date</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/chatbot.js}"></script>

<script th:if="${success}" th:inline="javascript">
    Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
</script>

</body>
</html>
