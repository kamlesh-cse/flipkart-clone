<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">
                        <i class="bi bi-key"></i> Forgot Password
                    </h3>
                    <p class="text-muted text-center mb-4">
                        Enter your registered email address. We'll send you a link to reset your password.
                    </p>

                    <!-- Forgot Password Form -->
                    <form th:action="@{/forgot-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="Enter your registered email" required>
                        </div>

                        <button type="submit" class="btn btn-primary-fk w-100 mb-3 shadow-sm py-3">
                            RESET PASSWORD
                        </button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Remember your password?
                        <a th:href="@{/login}" class="text-decoration-none fw-bold">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/chatbot.js}"></script>

<script th:if="${success}" th:inline="javascript">
    Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
</script>
<script th:if="${error}" th:inline="javascript">
    Swal.fire('Error!', /*[[${error}]]*/ '', 'error');
</script>

</body>
</html>
