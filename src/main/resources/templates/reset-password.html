<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">
                        <i class="bi bi-shield-lock"></i> Reset Password
                    </h3>
                    <p class="text-muted text-center mb-4">
                        Enter your new password below.
                    </p>

                    <!-- Reset Password Form -->
                    <form th:action="@{/reset-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter new password" required minlength="6">
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   placeholder="Confirm new password" required minlength="6">
                        </div>

                        <button type="submit" class="btn btn-primary-fk w-100 py-3 shadow-sm mt-3" onclick="return validatePasswords()">
                            UPDATE PASSWORD
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/chatbot.js}"></script>

<!-- Validate that both passwords match -->
<script>
function validatePasswords() {
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirmPassword').value;
    if (password !== confirmPassword) {
        Swal.fire('Error!', 'Passwords do not match!', 'error');
        return false;
    }
    return true;
}
</script>

<script th:if="${success}" th:inline="javascript">
    Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
</script>
<script th:if="${error}" th:inline="javascript">
    Swal.fire('Error!', /*[[${error}]]*/ '', 'error');
</script>

</body>
</html>
