<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FlipkartClone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h3><i class="bi bi-box-seam"></i> My Orders</h3>
    <hr>

    <!-- No Orders -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 bg-white shadow-sm rounded">
        <i class="bi bi-bag-x" style="font-size: 4rem; color: #ccc;"></i>
        <h4 class="text-muted mt-3">You haven't placed any orders yet.</h4>
        <a th:href="@{/home}" class="btn btn-primary-fk mt-3 px-5 py-2">Start Shopping</a>
    </div>

    <!-- Orders List -->
    <div th:each="order : ${orders}" class="card mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <strong>Order #<span th:text="${order.id}"></span></strong>
                <span class="text-muted ms-3"
                      th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}">Date</span>
            </div>
            <div>
                <!-- Status Badge -->
                <span th:switch="${order.status}">
                    <span th:case="'PLACED'" class="badge bg-info">PLACED</span>
                    <span th:case="'CONFIRMED'" class="badge bg-primary">CONFIRMED</span>
                    <span th:case="'SHIPPED'" class="badge bg-warning text-dark">SHIPPED</span>
                    <span th:case="'DELIVERED'" class="badge bg-success">DELIVERED</span>
                    <span th:case="'CANCELLED'" class="badge bg-danger">CANCELLED</span>
                </span>
            </div>
        </div>
        <div class="card-body">
            <table class="table table-sm mb-0">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td th:text="${item.product.name}">Product Name</td>
                        <td th:text="${item.quantity}">1</td>
                        <td>Rs. <span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 0)}"></span></td>
                    </tr>
                </tbody>
            </table>
            <hr>
            <div class="d-flex justify-content-between">
                <span><strong>Shipping:</strong> <span th:text="${order.shippingAddress}"></span></span>
                <strong class="text-primary">
                    Total: Rs. <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 0)}"></span>
                </strong>
            </div>
        </div>
    </div>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/chatbot.js}"></script>

<script th:if="${success}" th:inline="javascript">
    const msg = /*[[${success}]]*/ '';
    if (msg && msg.trim() !== '') {
        Swal.fire('Success!', msg, 'success');
    }
</script>
<script th:if="${error}" th:inline="javascript">
    const errorMsg = /*[[${error}]]*/ '';
    if (errorMsg && errorMsg.trim() !== '') {
        Swal.fire('Error!', errorMsg, 'error');
    }
</script>

</body>
</html>
