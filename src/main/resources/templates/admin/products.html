<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>
<body>

<!-- Include Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3><i class="bi bi-box-seam"></i> Manage Products</h3>
        <a th:href="@{/admin/products/add}" class="btn btn-primary-fk">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>
    <hr>

    <!-- Products Table -->
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td>
                        <img th:src="${product.imageUrl != null ? product.imageUrl :
                             '/images/no-image.png'}"
                             width="50" height="50" class="rounded" alt="Product">
                    </td>
                    <td th:text="${product.name}">Product Name</td>
                    <td th:text="${product.category}">Category</td>
                    <td>Rs. <span th:text="${#numbers.formatDecimal(product.price, 1, 0)}"></span></td>
                    <td>
                        <span th:if="${product.stock == 0}" class="text-danger fw-bold">Out of Stock</span>
                        <span th:if="${product.stock > 0 and product.stock <= 5}"
                              class="text-warning fw-bold" th:text="${product.stock}">5</span>
                        <span th:if="${product.stock > 5}" th:text="${product.stock}">100</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirmDelete(event)">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Delete confirmation -->
<script>
function confirmDelete(event) {
    event.preventDefault();
    Swal.fire({
        title: 'Delete Product?',
        text: "This action cannot be undone!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, Delete!'
    }).then((result) => {
        if (result.isConfirmed) {
            event.target.closest('form').submit();
        }
    });
    return false;
}
</script>

<script th:if="${success}" th:inline="javascript">
    const msg = /*[[${success}]]*/ '';
    if (msg && msg.trim() !== '') {
        Swal.fire('Success!', msg, 'success');
    }
</script>
<script th:if="${error}" th:inline="javascript">
    const errorMsg = /*[[${error}]]*/ '';
    if (errorMsg && errorMsg.trim() !== '') {
        Swal.fire('Error!', errorMsg, 'error');
    }
</script>

</body>
</html>
