<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipkartClone - Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/modern-ui.css}" rel="stylesheet">
</head>

<body>

    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Category Navigation Bar -->
    <div class="bg-white border-bottom shadow-sm mb-3 fade-in" th:if="${keyword == null}">
        <div class="container overflow-auto category-scroll px-0">
            <div class="d-flex justify-content-center text-center gap-2 gap-md-5">
                <a th:href="@{/home(category='Electronics')}" class="category-item">
                    <img src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/electronics.svg" width="64"
                        height="64" class="mb-1" alt="Electronics">
                    <span>Electronics</span>
                </a>
                <a th:href="@{/home(category='Clothing')}" class="category-item">
                    <img src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/fashion.svg"
                        width="64" height="64" class="mb-1" alt="Fashion">
                    <span>Fashion</span>
                </a>
                <a th:href="@{/home(category='Home & Kitchen')}" class="category-item">
                    <img src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/home-final.svg" width="64"
                        height="64" class="mb-1" alt="Home">
                    <span>Home</span>
                </a>
                <a th:href="@{/home(category='Accessories')}" class="category-item">
                    <img src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/tv.svg" width="64"
                        height="64" class="mb-1" alt="Appliances">
                    <span>Appliances</span>
                </a>
                <a th:href="@{/home(category='Books')}" class="category-item">
                    <img src="https://rukminim2.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=60" width="64"
                        height="64" class="mb-1" alt="Travel">
                    <span>Travel</span>
                </a>
                <a th:href="@{/home}" class="category-item text-primary">
                    <img src="https://rukminim2.flixcart.com/flap/128/128/image/dff3f7adcf3a90c6.png?q=100" width="64"
                        height="64" class="mb-1" alt="Beauty">
                    <span>All Offers</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Hero Carousel (Flipkart Style) -->
    <div th:if="${keyword == null}" id="homeCarousel" class="carousel slide container-fluid px-0 mb-4 shadow-sm fade-in"
        data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://akm-img-a-in.tosshub.com/aajtak/images/photo_gallery/202101/flipkart_sale_banner.jpg" class="d-block w-100" alt="Banner 1">
            </div>
            <div class="carousel-item">
                <img src="https://akm-img-a-in.tosshub.com/aajtak/images/photo_gallery/202012/flipkart_sale_banner_0.jpg" class="d-block w-100" alt="Banner 2">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon bg-white text-dark rounded-end py-5 px-3"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon bg-white text-dark rounded-start py-5 px-3"></span>
        </button>
    </div>

    <div class="container my-4">

        <!-- Search result heading -->
        <div th:if="${keyword != null}" class="mb-4 bg-white p-3 shadow-sm rounded">
            <h5 class="mb-0">Showing results for "<span class="text-primary" th:text="${keyword}"></span>"</h5>
            <a th:href="@{/home}" class="btn btn-link btn-sm p-0 text-decoration-none mt-1">Clear all filters</a>
        </div>

         <!-- Main Content Row -->
        <div class="row">
            <!-- Sidebar Filters (Mockup) -->
            <div class="col-lg-2 d-none d-lg-block">
                <div class="bg-white p-3 shadow-sm h-100">
                    <h6 class="fw-bold border-bottom pb-2 mb-3">Filters</h6>
                    <div class="mb-3">
                        <p class="small fw-bold text-uppercase mb-2">Category</p>
                        <div class="form-check small mb-1">
                            <input class="form-check-input" type="checkbox" id="cat1" checked>
                            <label class="form-check-label" for="cat1"
                                th:text="${selectedCategory != null ? selectedCategory : 'All'}"></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-lg-10">
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3">
                    <!-- Show message if no products found -->
                    <div th:if="${#lists.isEmpty(products)}" class="col-12 text-center py-5 bg-white shadow-sm">
                        <img src="https://static-assets-web.flixcart.com/batman-returns/static/content/svg/empty-cart-5a3d75.svg"
                            width="150" class="mb-3">
                        <h4 class="text-muted">No products found.</h4>
                    </div>

                    <!-- Product Cards -->
                    <div th:each="product : ${products}" class="col">
                        <div class="card fk-product-card h-100 p-2 border-0 shadow-sm">
                            <!-- Product Image -->
                            <div class="img-wrapper p-3 text-center position-relative">
                                <img th:src="${product.imageUrl != null && !product.imageUrl.isEmpty()} ?
                                 ${product.imageUrl} : '/images/no-image.png'" class="img-fluid"
                                    th:alt="${product.name}" style="height: 180px; object-fit: contain;">

                                <!-- Heart Icon (Wishlist Mockup) -->
                                <button class="btn btn-link position-absolute top-0 end-0 text-muted">
                                    <i class="bi bi-heart"></i>
                                </button>
                            </div>

                            <div class="card-body p-2 d-flex flex-column">
                                <h6 class="card-title text-truncate fw-normal mb-1" th:text="${product.name}">Product
                                    Name</h6>
                                <div class="d-grid gap-1 mb-3">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="price-main">₹<span
                                                th:text="${#numbers.formatDecimal(product.price, 1, 0)}"></span></span>
                                    </div>
                                    <div class="d-flex align-items-center">
                                        <span th:if="${product.stock > 0}" class="badge bg-success small me-2" style="font-size: 10px;">
                                            <i class="bi bi-check-circle-fill me-1"></i>In Stock
                                        </span>
                                        <span th:if="${product.stock == 0}" class="badge bg-secondary small" style="font-size: 10px;">Out of Stock</span>
                                    </div>
                                </div>

                                <!-- Stock Status -->
                                <div class="small mb-3">
                                    <span th:if="${product.stock > 0 and product.stock <= 5}"
                                        class="text-danger fw-bold">
                                        Only <span th:text="${product.stock}"></span> left!
                                    </span>
                                    <span th:if="${product.stock == 0}" class="text-danger fw-bold">Out of Stock</span>
                                    <img th:if="${product.stock > 0}"
                                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREE95ra5KHY6pblV7FBUDb7KLs1p2cQZahQg&s"
                                        height="20" alt="Assured">
                                </div>

                                <!-- Action Buttons -->
                                <div class="mt-auto row g-2">
                                    <div class="col-12">
                                        <a th:href="@{/product/{id}(id=${product.id})}"
                                            class="btn btn-outline-primary btn-sm w-100">Details</a>
                                    </div>
                                    <div class="col-12" th:if="${product.stock > 0}" sec:authorize="hasRole('USER')">
                                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-warning-fk btn-sm w-100 py-2">
                                                <i class="bi bi-cart-plus"></i> ADD TO CART
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FAQ Chatbot -->
    <script th:src="@{/js/chatbot.js}"></script>

    <!-- SweetAlert for flash messages -->
    <script th:if="${success}" th:inline="javascript">
        Swal.fire('Success!', /*[[${success}]]*/ '', 'success');
    </script>
    <script th:if="${error}" th:inline="javascript">
        Swal.fire('Error!', /*[[${error}]]*/ '', 'error');
    </script>

</body>

</html>
